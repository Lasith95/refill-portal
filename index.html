<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Refill Reserve Attendance</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box;}
        button { width: 48%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-in { background: #28a745; }
        .btn-out { background: #dc3545; }
        .btn-in:hover { background: #218838; }
        .btn-out:hover { background: #c82333; }
        #msg { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Refill Reserve</h2>
    <p>Staff Clock In/Out</p>

    <select id="branch">
        <option value="">Select Branch</option>
        <option>Refill Reserve - Hilli</option>
        <option>Refill Reserve - Nimah</option>
        <option>Refill Reserve - Al yahar</option>
        <option>Refill Reserve - Sarooj</option>
        <option>Refill Reserve - Riyadh</option>
        <option>Refill Reserve - Abudhabi</option>
    </select>

    <input type="password" id="pin" placeholder="Enter 4-Digit PIN" maxlength="4" inputmode="numeric">

    <div style="display: flex; justify-content: space-between;">
        <button class="btn-in" onclick="handleAction('Clock In')">Clock In</button>
        <button class="btn-out" onclick="handleAction('Clock Out')">Clock Out</button>
    </div>

    <div id="msg"></div>
</div>

<script>
    // 1. Generate/Get Device ID
    let deviceId = localStorage.getItem('rr_device_id');
    if (!deviceId) {
        deviceId = 'device-' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('rr_device_id', deviceId);
    }

    const scriptURL = 'https://script.google.com/macros/s/AKfycbx8FuFDjYC6CsK3Crwkc1dYOzFBt_1xoAapupPwIzOQD9jLqRZm51C51crJ3eTcgb0W/exec';

    async function handleAction(action) {
        const branch = document.getElementById('branch').value;
        const pin = document.getElementById('pin').value;
        const msgDiv = document.getElementById('msg');

        if (!branch || !pin) {
            alert("Please select branch and enter PIN");
            return;
        }

        // IP Check (Simplistic)
        const ipResponse = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipResponse.json();
        const userIP = ipData.ip;

        // 9 Hour Logic for Clock Out
        if (action === "Clock Out") {
            // This would ideally check the last clock-in from Sheet, 
            // for now, we send it to backend to process.
            if(!confirm("Are you sure you want to clock out? If 9 hours are not complete, please confirm with manager.")) {
                return;
            }
        }

        msgDiv.innerText = "Processing... Please wait.";

        // Call Google Script
        google.script.run.withSuccessHandler(function(res) {
            if(res.status === "success") {
                msgDiv.style.color = "green";
                msgDiv.innerText = "Success! Hello " + res.name + ". " + action + " recorded.";
                document.getElementById('pin').value = "";
            } else {
                msgDiv.style.color = "red";
                msgDiv.innerText = res.msg;
            }
        }).processAttendance(branch, pin, deviceId, action);
    }
</script>

</body>
</html>
